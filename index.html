<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbaTools - Select Language</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        action: '#05A045',
                        urgency: '#E64A19',
                        dark: '#0F172A', // Titles
                        text: '#475569',
                        background: '#F8FAFC',
                        highlight: '#FACC15',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Montserrat', sans-serif;
        }

        .flag-icon {
            font-size: 2rem;
            line-height: 1;
        }

        /* Hover animation for language cards */
        .lang-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="bg-background text-text min-h-screen flex flex-col items-center p-6 pt-16 relative overflow-x-hidden overflow-y-auto">

    <!-- Decorative Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 h-2 bg-gradient-to-r from-action via-highlight to-urgency z-50"></div>

    <main class="w-full max-w-md mx-auto flex flex-col items-center space-y-8 z-10">

        <!-- Header Section -->
        <div class="text-center space-y-4">
            <!-- Icon Globe -->
            <div
                class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center mx-auto mb-4 border border-gray-100">
                <i data-lucide="globe" class="w-6 h-6 text-action"></i>
            </div>

            <h1 class="text-3xl font-black text-dark uppercase tracking-wide leading-tight">
                SELECT LANGUAGE
            </h1>
            <p class="text-text font-medium text-sm">
                Choose your preference to continue
            </p>
        </div>

        <!-- Language Options -->
        <div class="w-full space-y-4 pb-24">

            <!-- English -->
            <a href="./en/index.html"
                class="lang-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between group transition-all duration-300 cursor-pointer no-underline block">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center shadow-inner border border-gray-100 overflow-hidden">
                        <img src="https://flagcdn.com/w160/us.png" alt="English" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-dark text-lg group-hover:text-action transition-colors">English</span>
                </div>
                <div
                    class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-action group-hover:text-white transition-all">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </a>

            <!-- Español -->
            <a href="./es/index.html"
                class="lang-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between group transition-all duration-300 cursor-pointer no-underline block">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center shadow-inner border border-gray-100 overflow-hidden">
                        <img src="https://flagcdn.com/w160/es.png" alt="Español" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-dark text-lg group-hover:text-action transition-colors">Español</span>
                </div>
                <div
                    class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-action group-hover:text-white transition-all">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </a>

            <!-- Français -->
            <a href="./fr/index.html"
                class="lang-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between group transition-all duration-300 cursor-pointer no-underline block">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center shadow-inner border border-gray-100 overflow-hidden">
                        <img src="https://flagcdn.com/w160/fr.png" alt="Français" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-dark text-lg group-hover:text-action transition-colors">Français</span>
                </div>
                <div
                    class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-action group-hover:text-white transition-all">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </a>

            <!-- Deutsch -->
            <a href="./de/index.html"
                class="lang-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between group transition-all duration-300 cursor-pointer no-underline block">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center shadow-inner border border-gray-100 overflow-hidden">
                        <img src="https://flagcdn.com/w160/de.png" alt="Deutsch" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-dark text-lg group-hover:text-action transition-colors">Deutsch</span>
                </div>
                <div
                    class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-action group-hover:text-white transition-all">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </a>

            <!-- Italiano -->
            <a href="./it/index.html"
                class="lang-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between group transition-all duration-300 cursor-pointer no-underline block">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center shadow-inner border border-gray-100 overflow-hidden">
                        <img src="https://flagcdn.com/w160/it.png" alt="Italiano" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-dark text-lg group-hover:text-action transition-colors">Italiano</span>
                </div>
                <div
                    class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-action group-hover:text-white transition-all">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </a>

        </div>

    </main>

    <!-- Footer Logo -->
    <footer class="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none z-0">
        <div class="flex items-center gap-2 opacity-80 scale-90">
            <img src="./assets/images/logo-abatools.png" alt="AbaTools" class="h-6 w-auto grayscale opacity-50">
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
